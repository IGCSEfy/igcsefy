        if (!sourceLength) return targetLength <= limit ? targetLength : limit + 1;
        if (!targetLength) return sourceLength <= limit ? sourceLength : limit + 1;
        if (Math.abs(sourceLength - targetLength) > limit) return limit + 1;

        let previous = Array.from({ length: targetLength + 1 }, (_, index) => index);

        for (let sourceIndex = 1; sourceIndex <= sourceLength; sourceIndex += 1) {
          const current = [sourceIndex];
          let rowMinimum = current[0];

          for (let targetIndex = 1; targetIndex <= targetLength; targetIndex += 1) {
            const substitutionCost = source[sourceIndex - 1] === target[targetIndex - 1] ? 0 : 1;
            const value = Math.min(
              previous[targetIndex] + 1,
              current[targetIndex - 1] + 1,
              previous[targetIndex - 1] + substitutionCost
            );
            current[targetIndex] = value;
            if (value < rowMinimum) rowMinimum = value;
          }

          if (rowMinimum > limit) {
            return limit + 1;
          }

          previous = current;
        }

        return previous[targetLength];
      };

      const isLooseTokenMatch = (queryToken, candidateToken) => {
        const query = String(queryToken || "").trim();
        const candidate = String(candidateToken || "").trim();

        if (!query || !candidate) return false;
        if (query === candidate) return true;
        if (query.length > 1 && candidate.length > 1) {
          if (query.startsWith(candidate) || candidate.startsWith(query)) {
            return true;
          }
        }
        if (isNumericSearchToken(query) || isNumericSearchToken(candidate)) {
          return false;
        }

        const limit = getFuzzyDistanceLimit(query, candidate);
        if (!limit) return false;

        return getLevenshteinDistanceWithinLimit(query, candidate, limit) <= limit;
      };

      const normalizeSearchText = (value) => {
        let text = String(value || "").toLowerCase();

        text = text.replace(/may\s*\/\s*june|may\s+june|\bmj\b/g, " may june ");
        text = text.replace(/oct(?:ober)?\s*\/\s*nov(?:ember)?|oct(?:ober)?\s+nov(?:ember)?|\bon\b/g, " oct nov ");
        text = text.replace(/feb(?:ruary)?\s*\/\s*march|feb(?:ruary)?\s+march|\bfm\b/g, " feb march ");
        text = text.replace(/\bquestion\s+paper\b/g, " qp ");
        text = text.replace(/\bmark\s+scheme\b/g, " ms ");
        text = text.replace(/\bpaper\s*([1-9])\b/g, " paper $1 ");
        text = text.replace(/\bp\s*([1-9])\b/g, " p $1 ");
        text = text.replace(/\bvariant\s*([0-9]{1,2})\b/g, " variant $1 ");
        text = text.replace(/\bv\s*([0-9]{1,2})\b/g, " v $1 ");
        text = text.replace(/[^a-z0-9]+/g, " ");

        return text.replace(/\s+/g, " ").trim();
      };

      const matchesAlias = (normalizedQuery, queryTokens, alias) => {
        if (!alias) return false;
        if (alias.length < 3) {
          return queryTokens.includes(alias);
        }
        if (new RegExp(`(?:^|\\s)${escapeRegex(alias)}(?:\\s|$)`).test(normalizedQuery)) {
          return true;
        }

        const aliasTokens = alias.split(" ").filter(Boolean);
        if (!aliasTokens.length) return false;

        return aliasTokens.every((aliasToken) =>
          queryTokens.some((token) => {
            if (token.length < 2) return false;
            return isLooseTokenMatch(token, aliasToken);
          })
        );
      };

      const normalizeLegacyPastPaperStatus = (value) => {
        if (value === true || value === 1 || value === "1" || value === "true") {
          return "done";
        }
        if (value === "in-progress") {
          return "in_progress";
        }
        return value === "in_progress" || value === "done" || value === "reviewed" ? value : null;
      };

      const readProgressSnapshot = () => {
        const live = safeParseJSON(readLocalStorage("igcsefy.live_data.v1")) || {};
        const liveSyllabus = live && typeof live.syllabusTopicStates === "object" ? live.syllabusTopicStates : {};
        const livePapers = live && typeof live.pastPaperStatuses === "object" ? live.pastPaperStatuses : {};
        const trackedSubjects = Array.isArray(live && live.trackedSubjects) ? live.trackedSubjects : [];
        const legacySyllabus = safeParseJSON(readLocalStorage("igcsefy.profile.syllabus.states.v1")) || {};
        const legacyPapers = safeParseJSON(readLocalStorage("igcsefy_pp_tracker_v1")) || {};
        const mergedPapers = {};

        Object.keys(legacyPapers || {}).forEach((trackKey) => {
          const normalized = normalizeLegacyPastPaperStatus(legacyPapers[trackKey]);
          if (normalized) {
            mergedPapers[String(trackKey)] = normalized;
          }
        });

        Object.keys(livePapers || {}).forEach((trackKey) => {
          const value = String(livePapers[trackKey] || "");
          if (value === "in_progress" || value === "done" || value === "reviewed") {
            mergedPapers[String(trackKey)] = value;
          }
        });

        return {
          trackedSubjects,
          syllabusTopicStates: Object.assign({}, legacySyllabus, liveSyllabus),
          pastPaperStatuses: mergedPapers
        };
      };

      const isSignedIn = () => {
        try {
          if (window.igcsefySupabase && window.igcsefySupabase.currentUser) {
            return true;
          }

          const hasSupabaseSession = Object.keys(window.localStorage || {}).some((key) => {
            if (!key || !key.startsWith("sb-") || !key.endsWith("-auth-token")) return false;
            const value = readLocalStorage(key);
            return !!String(value || "").trim();
          });

          if (hasSupabaseSession) return true;
        } catch (error) {}

        const token = readLocalStorage("igcsefy_access_token") || readLocalStorage("token");
        return !!String(token || "").trim();
      };

      const readRecentSearches = () => {
        const parsed = safeParseJSON(readLocalStorage(HOME_SEARCH_RECENTS_KEY));
        if (!Array.isArray(parsed)) return [];

        return parsed
          .map((item) => {
            const query = String(item && item.query ? item.query : "").trim();
            if (!query) return null;
            return {
              query,
              normalized: normalizeSearchText(query),
              usedAt: typeof item.usedAt === "string" ? item.usedAt : null
            };
          })
          .filter(Boolean)
          .slice(0, HOME_SEARCH_LIMITS.recents);
      };

      const writeRecentSearches = (items) => {
        writeLocalStorage(HOME_SEARCH_RECENTS_KEY, JSON.stringify(items.slice(0, HOME_SEARCH_LIMITS.recents)));
      };

      const pushRecentSearch = (query) => {
        const label = String(query || "").trim();
        if (!label) return;

        const normalized = normalizeSearchText(label);
        const next = [
          {
            query: label,
            normalized,
            usedAt: new Date().toISOString()
          },
          ...readRecentSearches().filter((item) => item.normalized !== normalized)
        ];

        writeRecentSearches(next);
      };

      const readRecentSelections = () => {
        const parsed = safeParseJSON(readLocalStorage(HOME_SEARCH_SELECTIONS_KEY));
        if (!Array.isArray(parsed)) return [];

        return parsed
          .map((item) => {
            if (!item || typeof item !== "object") return null;
            const id = String(item.id || item.trackKey || item.href || "").trim();
            if (!id) return null;
            return {
              id,
              type: String(item.type || "").trim(),
              title: String(item.title || "").trim(),
              subtitle: String(item.subtitle || "").trim(),
              href: String(item.href || "").trim(),
              subjectSlug: String(item.subjectSlug || "").trim(),
              trackKey: String(item.trackKey || "").trim(),
              topicKey: String(item.topicKey || "").trim(),
              query: String(item.query || "").trim(),
              selectedAt: typeof item.selectedAt === "string" ? item.selectedAt : null
            };
          })
          .filter(Boolean)
          .slice(0, HOME_SEARCH_LIMITS.selections);
      };

      const writeRecentSelections = (items) => {
        writeLocalStorage(HOME_SEARCH_SELECTIONS_KEY, JSON.stringify(items.slice(0, HOME_SEARCH_LIMITS.selections)));
      };

      const pushRecentSelection = (result, query) => {
        if (!result || result.mode !== "navigate") return;
        const id = String(result.trackKey || result.id || result.href || "").trim();
        if (!id) return;

        const record = {
          id,
          type: result.type || "",
          title: result.title || "",
          subtitle: result.subtitle || "",
          href: result.href || "",
          subjectSlug: result.subjectSlug || "",
          trackKey: result.trackKey || "",
          topicKey: result.topicKey || "",
          query: String(query || "").trim(),
          selectedAt: new Date().toISOString()
        };

        const next = [record, ...readRecentSelections().filter((item) => item.id !== id)];
        writeRecentSelections(next);
      };

      const buildSubjectAliases = (subject) => {
        const aliases = new Set([
          subject.name,
          subject.code,
          subject.slug.replace(/-\d+$/, "").replace(/-/g, " ")
        ]);

        (SUBJECT_ALIAS_OVERRIDES[subject.code] || []).forEach((alias) => aliases.add(alias));

        const nameTokens = String(subject.name || "")
          .toLowerCase()
          .split(/\s+/)
          .filter(Boolean);

        if (nameTokens[0] && nameTokens[0].length > 3) {
          aliases.add(nameTokens[0]);
        }

        if (nameTokens.length > 1) {
          aliases.add(nameTokens.slice(0, 2).join(" "));
        }

        return Array.from(aliases)
          .map(normalizeSearchText)
          .filter(Boolean);
      };

      const stripSyllabusLabel = (value) => {
        const label = String(value || "").trim();
        return label.replace(/^\d+(?:\.\d+)*(?:\s+|(?=[A-Za-z]))/, "").trim() || label;
      };

      const buildHrefWithParams = (href, params) => {
        const url = new URL(String(href || "/"), window.location.origin);
        Object.entries(params || {}).forEach(([key, value]) => {
          if (value == null || value === "") return;
          url.searchParams.set(key, String(value));
        });
        return `${url.pathname}${url.search}${url.hash}`;
      };

      const buildTokenSet = (value) => new Set(normalizeSearchText(value).split(" ").filter(Boolean));

      const buildPastPaperFileHref = (subjectSlug, year, sessionCode, fileName) =>
        `/past-papers/${subjectSlug}/${year}/${sessionCode}/${fileName}`;

      const extractFileNameFromHref = (href) => {
        const cleanHref = String(href || "").split("?")[0].split("#")[0];
        const fileName = cleanHref.split("/").pop() || "";
        return /\.pdf$/i.test(fileName) ? fileName : "";
      };

      const extractExactPaperFileName = (rawValue) => {
        const match = String(rawValue || "").match(
          /\b(\d{4}_[msw]\d{2}_(?:qp|ms|ci|in)_[0-9]{2}\.pdf|\d{4}_[msw]\d{2}_(?:gt|er)\.pdf)\b/i
        );
        return match ? match[1].toLowerCase() : "";
      };

      const parseExactPaperFileName = (fileName) => {
        const cleanFileName = String(fileName || "").trim().toLowerCase();
        const variantMatch = cleanFileName.match(/^(\d{4})_([msw])(\d{2})_(qp|ms|ci|in)_([0-9]{2})\.pdf$/i);
        if (variantMatch) {
          const [, subjectCode, sessionCode, yearSuffix, kind, variantNumber] = variantMatch;
          return {
            subjectCode,
            session: sessionCode,
            year: 2000 + Number(yearSuffix),
            fileIntent: kind,
            variant: variantNumber,
            paper: Number(variantNumber.charAt(0))
          };
        }

        const seriesMatch = cleanFileName.match(/^(\d{4})_([msw])(\d{2})_(gt|er)\.pdf$/i);
        if (seriesMatch) {
          const [, subjectCode, sessionCode, yearSuffix, kind] = seriesMatch;
          return {
            subjectCode,
            session: sessionCode,
            year: 2000 + Number(yearSuffix),
            fileIntent: kind,
            variant: null,
            paper: null
          };
        }

        return null;
      };

      const buildStaticSiteSearchEntries = () =>
        HOME_SITE_SEARCH_ROUTES.map((route) => {
          const aliases = Array.isArray(route.aliases)
            ? route.aliases.map(normalizeSearchText).filter(Boolean)
            : [];
          const searchText = normalizeSearchText([
            route.title,
            route.subtitle,
            route.badge,
            aliases.join(" ")
          ].join(" "));

          return Object.assign({}, route, {
            aliases,
            searchText,
            tokenSet: buildTokenSet(searchText)
          });
        });

      const buildDocumentSearchTitle = (subject, sessionMeta, year, kind, paperNumber, variantNumber) => {
        if (kind === "gt") {
          return `${subject.name} ${subject.code} • ${sessionMeta.label} ${year} • Grade Threshold`;
        }
        if (kind === "er") {
          return `${subject.name} ${subject.code} • ${sessionMeta.label} ${year} • Examiner Report`;
        }
        if (kind === "in") {
          return `${subject.name} ${subject.code} • ${sessionMeta.label} ${year} • Paper ${paperNumber} • Variant ${variantNumber} • Insert`;
        }
        if (kind === "ci") {
          return `${subject.name} ${subject.code} • ${sessionMeta.label} ${year} • Paper ${paperNumber} • Variant ${variantNumber} • CI`;
        }
        return `${subject.name} ${subject.code} • ${sessionMeta.label} ${year}`;
      };

      const matchesVariantQuery = (queryVariant, entryVariant) => {
        if (!queryVariant) return true;
        const normalizedEntryVariant = String(entryVariant || "").trim().padStart(2, "0");
        const normalizedQueryVariant = String(queryVariant || "").trim().padStart(2, "0");
        if (!normalizedEntryVariant) return false;
        return (
          normalizedEntryVariant === normalizedQueryVariant ||
          normalizedEntryVariant.endsWith(normalizedQueryVariant.slice(-1))
        );
      };

      const buildDocumentSearchSubtitle = (kind) => {
        if (kind === "ci") return "Open the confidential instructions file";
        if (kind === "in") return "Open the insert file";
        if (kind === "gt") return "Open the grade thresholds file";
        if (kind === "er") return "Open the examiner report file";
        return "Open the document file";
      };

      const buildPastPaperFileSearchEntries = (fileManifest, subjectBySlug) => {
        if (!fileManifest || typeof fileManifest !== "object") {
          return [];
        }

        const entries = [];

        Object.entries(fileManifest).forEach(([subjectSlug, years]) => {
          const subject = subjectBySlug.get(subjectSlug);
          if (!subject || !years || typeof years !== "object") return;

          Object.entries(years).forEach(([yearKey, sessions]) => {
            const year = Number(yearKey);
            if (!Number.isFinite(year) || !sessions || typeof sessions !== "object") return;

            Object.entries(sessions).forEach(([sessionCode, sessionInfo]) => {
              const sessionMeta = SESSION_META[sessionCode] || SESSION_META.s;
              const addEntry = (kind, fileName, paperNumber, variantNumber) => {
                const cleanFileName = String(fileName || "").trim();
                if (!cleanFileName) return;

                const title = buildDocumentSearchTitle(
                  subject,
                  sessionMeta,
                  year,
                  kind,
                  paperNumber,
                  variantNumber
                );
                const searchText = normalizeSearchText([
                  subject.name,
                  subject.code,
                  subject.aliases.join(" "),
                  cleanFileName,
                  title,
                  sessionMeta.label,
                  sessionMeta.searchLabel,
                  sessionCode,
                  paperNumber ? `paper ${paperNumber} p ${paperNumber}` : "",
                  variantNumber ? `variant ${variantNumber} v ${variantNumber}` : "",
                  kind === "ci" ? "confidential instructions ci" : "",
                  kind === "in" ? "insert inserts" : "",
                  kind === "gt" ? "grade threshold grade thresholds gt" : "",
                  kind === "er" ? "examiner report examiner reports er" : ""
                ].join(" "));

                entries.push({
                  id: `paper-file:${subjectSlug}:${year}:${sessionCode}:${kind}:${paperNumber || 0}:${variantNumber || "series"}`,
                  type: "paper-file",
                  kind,
                  title,
                  subtitle: buildDocumentSearchSubtitle(kind),
                  badge: kind.toUpperCase(),
                  href: buildPastPaperFileHref(subjectSlug, year, sessionCode, cleanFileName),
                  subjectSlug,
                  subjectCode: subject.code,
                  subjectName: subject.name,
                  fileName: cleanFileName,
                  year,
                  session: sessionCode,
                  sessionLabel: sessionMeta.label,
                  sessionRank: sessionMeta.rank,
                  paperNumber: paperNumber ? Number(paperNumber) : 0,
                  variantNumber: variantNumber ? String(variantNumber).padStart(2, "0") : "",
                  searchText,
                  tokenSet: buildTokenSet(searchText)
                });
              };

              const ciEntries = Array.isArray(sessionInfo && sessionInfo.ci) ? sessionInfo.ci : [];
              ciEntries.forEach((item) => {
                const fileName = typeof item === "string" ? item : item && item.file;
                const variantMatch = String(fileName || "").match(/_(\d{2})\.pdf$/i);
                const variantNumber = variantMatch ? variantMatch[1] : "";
                const paperNumber = variantNumber ? Number(variantNumber.charAt(0)) : 0;
                addEntry("ci", fileName, paperNumber, variantNumber);
              });

              const insertEntries =
                sessionInfo && sessionInfo.in && typeof sessionInfo.in === "object"
                  ? sessionInfo.in
                  : {};
              Object.entries(insertEntries).forEach(([paperKey, variants]) => {
                if (!variants || typeof variants !== "object") return;
                Object.entries(variants).forEach(([variantKey, fileName]) => {
                  const variantNumber = String(variantKey || "").padStart(2, "0");
                  const paperNumber = Number(paperKey) || Number(variantNumber.charAt(0)) || 0;
                  addEntry("in", fileName, paperNumber, variantNumber);
                });
              });

              ["gt", "er"].forEach((kind) => {
                const seriesEntries = Array.isArray(sessionInfo && sessionInfo[kind]) ? sessionInfo[kind] : [];
                seriesEntries.forEach((item) => {
                  const fileName = typeof item === "string" ? item : item && item.file;
                  addEntry(kind, fileName, 0, "");
                });
              });
            });
          });
        });

        return entries;
      };

      const hasPastPaperIntent = (parsed) =>
        !!(
          parsed &&
          (
            parsed.hasPaperFilters ||
            parsed.fileIntent ||
            ((parsed.subjectCode || parsed.subjectSlugs.size) && (parsed.paper || parsed.variant || parsed.year || parsed.session)) ||
            (parsed.year && parsed.paper) ||
            (parsed.session && parsed.paper)
          )
        );

      const hasSpecificPastPaperTarget = (parsed) =>
        !!(
          parsed &&
          (
            parsed.variant ||
            (parsed.paper && parsed.fileIntent) ||
            ((parsed.subjectCode || parsed.subjectSlugs.size) && (parsed.paper || parsed.variant)) ||
            ((parsed.subjectCode || parsed.subjectSlugs.size) && parsed.year && (parsed.paper || parsed.session || parsed.fileIntent)) ||
            (parsed.year && parsed.paper)
          )
        );

      const prepareHomeSearchData = (rawData, fileManifest) => {
        const subjects = Array.isArray(rawData && rawData.subjects) ? rawData.subjects : [];
        const paperEntries = Array.isArray(rawData && rawData.paperEntries) ? rawData.paperEntries : [];
        const syllabusEntries = Array.isArray(rawData && rawData.syllabusEntries) ? rawData.syllabusEntries : [];
        const paperCounts = new Map();

        paperEntries.forEach((entry) => {
          paperCounts.set(entry.subjectSlug, (paperCounts.get(entry.subjectSlug) || 0) + 1);
        });

        const preparedSubjects = subjects.map((subject) => {
          const aliases = buildSubjectAliases(subject);
          const subjectHref = subject.subjectHref || `/subjects/${subject.slug}/`;
          const pastPapersHref = subject.pastPapersHref || `/past-papers/${subject.slug}/`;
          const subjectTokenSet = new Set(
            normalizeSearchText([subject.name, subject.code, aliases.join(" ")].join(" "))
              .split(" ")
              .filter(Boolean)
          );

          return Object.assign({}, subject, {
            aliases,
            subjectHref,
            syllabusHref: subjectHref,
            syllabusPageHref: subjectHref,
            pastPapersHref,
            pastPapersPageHref: buildHrefWithParams(subjectHref, { tab: "past-papers" }),
            normalizedName: normalizeSearchText(subject.name),
            searchText: normalizeSearchText([
              subject.name,
              subject.code,
              subject.slug.replace(/-/g, " "),
              aliases.join(" ")
            ].join(" ")),
            subjectTokenSet,
            hasPastPapers: paperCounts.has(subject.slug)
          });
        });

        const subjectBySlug = new Map(preparedSubjects.map((subject) => [subject.slug, subject]));
        const subjectByCode = new Map(preparedSubjects.map((subject) => [subject.code, subject]));
        const staticPages = buildStaticSiteSearchEntries();

        const preparedPapers = paperEntries
          .map((entry) => {
            const subject = subjectBySlug.get(entry.subjectSlug);
            if (!subject) return null;
            const sessionMeta = SESSION_META[entry.session] || SESSION_META.s;
            const title = `${subject.name} ${subject.code} • ${sessionMeta.label} ${entry.year} • Paper ${entry.paperNumber} • Variant ${entry.variant}`;
            const defaultType = entry.qpHref ? "qp" : "ms";
            const searchText = normalizeSearchText([
              subject.name,
              subject.code,
              subject.slug.replace(/-/g, " "),
              subject.aliases.join(" "),
              entry.year,
              sessionMeta.label,
              sessionMeta.searchLabel,
              `paper ${entry.paperNumber}`,
              `p ${entry.paperNumber}`,
              `variant ${entry.variant}`,
              `v ${entry.variant}`,
              "qp question paper",
              "ms mark scheme",
              title
            ].join(" "));
            const tokenSet = new Set(searchText.split(" ").filter(Boolean));

            return Object.assign({}, entry, {
              subject,
              subjectCode: subject.code,
              subjectName: subject.name,
              subjectRoute: subject.subjectHref,
              subjectPastPapersRoute: subject.pastPapersPageHref,
              sessionRaw: entry.session,
              sessionNormalized: sessionMeta.searchLabel,
              sessionLabel: sessionMeta.label,
              sessionRank: sessionMeta.rank,
              displayLabel: title,
              paperNumber: Number(entry.paperNumber),
              variantNumber: String(entry.variant || "").padStart(2, "0"),
              qpUrl: entry.qpHref || "",
              msUrl: entry.msHref || "",
              defaultType,
              openHref: `${subject.pastPapersHref}?track=${encodeURIComponent(entry.trackKey)}`,
              title,
              searchText,
              tokenSet
            });
          })
          .filter(Boolean);

        const preparedSyllabus = syllabusEntries
          .map((entry) => {
            const subject = subjectBySlug.get(entry.subjectSlug);
            if (!subject) return null;

            const sectionDisplayTitle = stripSyllabusLabel(entry.sectionTitle);
            const topicDisplayTitle = entry.topicTitle ? stripSyllabusLabel(entry.topicTitle) : "";
            const title =
              entry.kind === "topic"
                ? `${subject.name} ${subject.code} • ${topicDisplayTitle || sectionDisplayTitle}`
                : `${subject.name} ${subject.code} • ${sectionDisplayTitle}`;
            const subtitle =
              entry.kind === "topic"
                ? `${sectionDisplayTitle} • ${entry.level === "extended" ? "Extended" : "Core"} syllabus`
                : `${entry.level === "extended" ? "Extended" : "Core"} syllabus topic area`;
            const href = buildHrefWithParams(subject.syllabusPageHref, {
              tab: "syllabus",
              level: entry.level || "core",
              section: entry.sectionId || "",
              topic: entry.topicId || ""
            });
            const sectionSearchText = normalizeSearchText([entry.sectionTitle, sectionDisplayTitle].join(" "));
            const topicSearchText = normalizeSearchText([entry.topicTitle || "", topicDisplayTitle].join(" "));
            const searchText = normalizeSearchText([
              subject.name,
              subject.code,
              subject.aliases.join(" "),
              entry.kind,
              "syllabus topics section",
              entry.level,
              sectionDisplayTitle,
              entry.sectionTitle,
              topicDisplayTitle,
              entry.topicTitle || ""
            ].join(" "));

            return Object.assign({}, entry, {
              subject,
              subjectCode: subject.code,
              subjectName: subject.name,
              title,
              subtitle,
              href,
              searchText,
              sectionDisplayTitle,
              topicDisplayTitle,
              sectionSearchText,
              topicSearchText,
              tokenSet: new Set(searchText.split(" ").filter(Boolean)),
              topicTokenSet: new Set(topicSearchText.split(" ").filter(Boolean)),
              sectionTokenSet: new Set(sectionSearchText.split(" ").filter(Boolean))
            });
          })
          .filter(Boolean);

        const fileEntries = buildPastPaperFileSearchEntries(fileManifest, subjectBySlug);
        const exactFileTargetByName = new Map();

        preparedPapers.forEach((entry) => {
          const qpFileName = extractFileNameFromHref(entry.qpUrl || entry.qpHref);
          const msFileName = extractFileNameFromHref(entry.msUrl || entry.msHref);

          if (qpFileName) {
            exactFileTargetByName.set(qpFileName.toLowerCase(), {
              type: "track-file",
              fileIntent: "qp",
              entry
            });
          }
          if (msFileName) {
            exactFileTargetByName.set(msFileName.toLowerCase(), {
              type: "track-file",
              fileIntent: "ms",
              entry
            });
          }
        });

        fileEntries.forEach((entry) => {
          if (!entry.fileName) return;
          exactFileTargetByName.set(String(entry.fileName).toLowerCase(), {
            type: "paper-file",
            entry
          });
        });

        return {
          subjects: preparedSubjects,
          subjectBySlug,
          subjectByCode,
          staticPages,
          paperEntries: preparedPapers,
          paperSearchIndex: preparedPapers,
          paperByTrackKey: new Map(preparedPapers.map((entry) => [entry.trackKey, entry])),
          fileEntries,
          exactFileTargetByName,
          syllabusEntries: preparedSyllabus,
          syllabusByTopicKey: new Map(
            preparedSyllabus
              .filter((entry) => entry.topicKey)
              .map((entry) => [entry.topicKey, entry])
          )
        };
      };

      const ensureHomeSearchData = () => {
        if (uiState.homeSearchData) {
          return Promise.resolve(uiState.homeSearchData);
        }
        if (uiState.homeSearchDataPromise) {
          return uiState.homeSearchDataPromise;
        }

        uiState.homeSearchDataPromise = Promise.all([
          fetch(HOME_SEARCH_DATA_URL, { cache: "no-store" })
            .then((response) => (response.ok ? response.json() : { subjects: [], paperEntries: [], syllabusEntries: [] }))
            .catch(() => ({ subjects: [], paperEntries: [], syllabusEntries: [] })),
          fetch(HOME_PAST_PAPER_FILE_MANIFEST_URL, { cache: "no-store" })
            .then((response) => (response.ok ? response.json() : {}))
            .catch(() => ({}))
        ])
          .then(([rawData, fileManifest]) => {
            uiState.homeSearchData = prepareHomeSearchData(rawData, fileManifest);
            return uiState.homeSearchData;
          });

        return uiState.homeSearchDataPromise;
      };

      const parseSearchQuery = (rawValue, data) => {
        const exactFileName = extractExactPaperFileName(rawValue);
        const exactFileMeta = exactFileName ? parseExactPaperFileName(exactFileName) : null;
        const normalized = normalizeSearchText(rawValue);
        const tokens = normalized ? normalized.split(" ") : [];
        const subjectSlugs = new Set();
        const subjectTokens = new Set();
        let subjectCode = exactFileMeta && exactFileMeta.subjectCode ? exactFileMeta.subjectCode : null;

        (data ? data.subjects : []).forEach((subject) => {
          let matched = false;
          if (tokens.includes(subject.code)) {
            subjectCode = subject.code;
            subjectSlugs.add(subject.slug);
            matched = true;
          }

          subject.aliases.forEach((alias) => {
            if (matchesAlias(normalized, tokens, alias)) {
              subjectSlugs.add(subject.slug);
              matched = true;
            }
          });

          if (matched) {
            subject.subjectTokenSet.forEach((token) => subjectTokens.add(token));
          }
        });

        let session = exactFileMeta && exactFileMeta.session ? exactFileMeta.session : null;
        if (normalized.includes("may june")) {
          session = "s";
        } else if (normalized.includes("oct nov")) {
          session = "w";
        } else if (normalized.includes("feb march")) {
          session = "m";
        } else {
          const compactSessionMatch = normalized.match(/\b([msw])(\d{2})\b/);
          if (compactSessionMatch) {
            session = compactSessionMatch[1];
          }
        }

        const yearMatch = normalized.match(/\b(20\d{2})\b/);
        const paperMatch = normalized.match(/\b(?:paper|p)\s+([1-9])\b/);
        const variantMatch = normalized.match(/\b(?:variant|v)\s+([0-9]{1,2})\b/);
        const compactVariantMatch = normalized.match(/\b(?:qp|ms|ci|in)\s+([0-9]{2})\b/);
        const fileIntent =
          (exactFileMeta && exactFileMeta.fileIntent) ||
          (/\bqp\b/.test(normalized) || /\bquestion\s+paper\b/.test(normalized)
            ? "qp"
            : /\bms\b/.test(normalized) || /\bmark\s+scheme\b/.test(normalized)
              ? "ms"
              : /\bci\b/.test(normalized) || /\bconfidential\s+instructions?\b/.test(normalized)
                ? "ci"
                : /\binserts?\b/.test(normalized)
                  ? "in"
                  : /\ber\b/.test(normalized) || /\bexaminer\s+reports?\b/.test(normalized)
                    ? "er"
                    : /\bgt\b/.test(normalized) || /\bgrade\s+thresholds?\b/.test(normalized) || /\bthresholds?\b/.test(normalized)
                      ? "gt"
                      : "");
        const intents = new Set();
        let paper = exactFileMeta && exactFileMeta.paper ? exactFileMeta.paper : (paperMatch ? Number(paperMatch[1]) : null);
        const variant =
          exactFileMeta && exactFileMeta.variant
            ? exactFileMeta.variant
            : variantMatch
              ? variantMatch[1].padStart(2, "0")
              : compactVariantMatch
                ? compactVariantMatch[1].padStart(2, "0")
                : null;

        if (!paper && variant && variant.length === 2 && /^[1-9]/.test(variant)) {
          paper = Number(variant.charAt(0));
        }

        if (/\b(profile|account|student|user)\b/.test(normalized)) {
          intents.add("profile");
        }
        if (/\b(progress|activity|tracker|tracked)\b/.test(normalized)) {
          intents.add("progress");
        }
        if (/\b(syllabus|specification|topics?)\b/.test(normalized)) {
          intents.add("syllabus");
        }
        if (
          /\b(past papers?|past paper|question papers?|question paper|mark schemes?|mark scheme|qp|ms|ci|gt|er|confidential instructions?|examiner reports?|grade thresholds?|thresholds?|inserts?)\b/.test(normalized) ||
          yearMatch ||
          paperMatch ||
          variantMatch ||
          compactVariantMatch ||
          session
        ) {
          intents.add("past-papers");
        }

        const contentTokens = tokens.filter(
          (token) =>
            token &&
            !subjectTokens.has(token) &&
            !SEARCH_NOISE_TOKENS.has(token) &&
            !/^\d+$/.test(token)
        );

        const year =
          exactFileMeta && exactFileMeta.year
            ? exactFileMeta.year
            : yearMatch
              ? Number(yearMatch[1])
              : (() => {
                  const compactSessionMatch = normalized.match(/\b[msw](\d{2})\b/);
                  return compactSessionMatch ? 2000 + Number(compactSessionMatch[1]) : null;
                })();
        const hasPaperFilters = !!(year || paper || variant || session);
        const pastPaperIntent = hasPastPaperIntent({
          hasPaperFilters,
          fileIntent,
          subjectCode,
          subjectSlugs,
          year,
          session,
          paper,
          variant
        });
        const specificPastPaperTarget = hasSpecificPastPaperTarget({
          fileIntent,
          subjectCode,
          subjectSlugs,
          year,
          session,
          paper,
          variant
        });

        return {
          raw: rawValue,
          normalized,
          tokens,
          subjectCode,
          subjectSlugs,
          subjectTokens,
          contentTokens,
          contentQuery: contentTokens.join(" "),
          year,
          session,
          paper,
          variant,
          exactFileName,
          fileIntent,
          intents,
          hasPaperFilters,
          isPastPaperIntent: pastPaperIntent,
          hasSpecificPastPaperTarget: specificPastPaperTarget
        };
      };

      const buildRecentBoostMaps = () => {
        const subjectBoosts = new Map();
        const trackBoosts = new Map();
        const topicBoosts = new Map();

        readRecentSelections().forEach((item, index) => {
          const boost = Math.max(1, 6 - index);
          if (item.subjectSlug) {
            subjectBoosts.set(item.subjectSlug, Math.max(subjectBoosts.get(item.subjectSlug) || 0, boost));
          }
          if (item.trackKey) {
            trackBoosts.set(item.trackKey, Math.max(trackBoosts.get(item.trackKey) || 0, boost));
          }
          if (item.topicKey) {
            topicBoosts.set(item.topicKey, Math.max(topicBoosts.get(item.topicKey) || 0, boost));
          }
        });

        return {
          subjectBoosts,
          trackBoosts,
          topicBoosts
        };
      };

      const countTokenMatches = (tokens, tokenSet) => {
        if (!Array.isArray(tokens) || !tokens.length || !(tokenSet instanceof Set) || !tokenSet.size) {
          return 0;
        }

        const tokenCandidates = Array.from(tokenSet);
        return tokens.reduce((count, token) => {
          if (!token) return count;
          if (tokenSet.has(token)) return count + 1;
          return count + (tokenCandidates.some((candidate) => isLooseTokenMatch(token, candidate)) ? 1 : 0);
        }, 0);
      };

      const createQueryResult = (query, subtitle, icon, id) => ({
        id,
        type: "query",
        mode: "query",
        icon: icon || "search",
        title: query,
        subtitle
      });

      const createNavigateResult = (config) =>
        Object.assign(
          {
            mode: "navigate",
            actions: []
          },
          config
        );

      const createSitePageResult = (entry, score) =>
        createNavigateResult({
          id: entry.id,
          type: "site-page",
          icon: entry.icon || "search",
          title: entry.title,
          subtitle: entry.subtitle,
          badge: entry.badge,
          href: entry.href,
          score
        });

      const createSubjectResult = (subject, score) =>
        createNavigateResult({
          id: `subject:${subject.slug}`,
          type: "subject",
          icon: "book-open",
          title: `${subject.name} (${subject.code})`,
          subtitle: "Open subject page",
          badge: subject.code,
          href: subject.subjectHref,
          subjectSlug: subject.slug,
          score
        });

      const createSyllabusResult = (subject, score, subtitle) =>
        createNavigateResult({
          id: `syllabus:${subject.slug}`,
          type: "syllabus",
          icon: "book-open",
          title: `${subject.name} Syllabus`,
          subtitle: subtitle || "Open syllabus",
          badge: "Syllabus",
          href: subject.syllabusPageHref,
          subjectSlug: subject.slug,
          score
        });

      const createPastPaperHubResult = (subject, score) =>
        createNavigateResult({
          id: `past-papers:${subject.slug}`,
          type: "past-papers-hub",
          icon: "file-text",
          title: `${subject.name} Past Papers`,
          subtitle: "Open subject past papers",
          badge: "Past papers",
          href: subject.pastPapersPageHref,
          subjectSlug: subject.slug,
          score
        });

      const createPastPaperResult = (entry, score, options) =>
        createNavigateResult({
          id: `paper:${entry.trackKey}`,
          type: "past-paper",
          icon: "file-text",
          title: entry.displayLabel || entry.title,
          subtitle:
            (options && options.subtitle) ||
            (options && options.fileIntent === "qp"
              ? "Open the question paper file"
              : options && options.fileIntent === "ms"
                ? "Open the mark scheme file"
                : "Open the exact paper destination"),
          badge:
            options && options.fileIntent
              ? options.fileIntent.toUpperCase()
              : "",
          href:
            options && options.fileIntent === "qp"
              ? entry.qpUrl || entry.qpHref || entry.openHref
              : options && options.fileIntent === "ms"
                ? entry.msUrl || entry.msHref || entry.openHref
                : entry.openHref,
          subjectSlug: entry.subjectSlug,
          trackKey: entry.trackKey,
          score,
          sortYear: entry.year,
          sortSessionRank: entry.sessionRank,
          sortPaperNumber: entry.paperNumber,
          sortVariant: Number(entry.variantNumber || entry.variant),
          actions: [
            entry.qpUrl || entry.qpHref ? { label: "QP", href: entry.qpUrl || entry.qpHref } : null,
            entry.msUrl || entry.msHref ? { label: "MS", href: entry.msUrl || entry.msHref } : null,
            null
          ].filter(Boolean)
        });

      const createSyllabusTopicResult = (entry, score, subtitleOverride) =>
        createNavigateResult({
          id: `syllabus-entry:${entry.kind}:${entry.subjectSlug}:${entry.level}:${entry.sectionId}:${entry.topicId || "section"}`,
          type: entry.kind === "topic" ? "syllabus-topic" : "syllabus-section",
          icon: "book-open",
          title: entry.title,
          subtitle: subtitleOverride || entry.subtitle,
          badge: entry.kind === "topic" ? "Topic" : "Syllabus",
          href: entry.href,
          subjectSlug: entry.subjectSlug,
          topicKey: entry.topicKey || "",
          score,
          sortSectionIndex: entry.sectionIndex || 0,
          sortTopicIndex: entry.topicIndex || 0
        });

      const createPaperFileResult = (entry, score) =>
        createNavigateResult({
          id: entry.id,
          type: "paper-file",
          icon: "file-text",
          title: entry.title,
          subtitle: entry.subtitle,
          badge: entry.badge,
          href: entry.href,
          subjectSlug: entry.subjectSlug,
          score,
          sortYear: entry.year,
          sortSessionRank: entry.sessionRank,
          sortPaperNumber: entry.paperNumber || 0,
          sortVariant: entry.variantNumber ? Number(entry.variantNumber) : 0
        });

      const buildProfileRouteResults = (parsed) => {
        const results = [];
        const wantsProfile = parsed.intents.has("profile") || parsed.normalized === "profile";
        const wantsProgress = parsed.intents.has("progress") || parsed.normalized === "progress";

        if (wantsProgress) {
          results.push(
            createNavigateResult({
              id: "profile:progress",
              type: "progress",
              icon: "activity",
              title: "Your Progress",
              subtitle: "Open your profile progress",
              badge: "Profile",
              href: "/profile/",
              score: 220
            })
          );
        }

        if (wantsProfile || wantsProgress) {
          results.push(
            createNavigateResult({
              id: "profile:page",
              type: "profile",
              icon: "user",
              title: "Your Profile",
              subtitle: "Open your profile",
              badge: "Profile",
              href: "/profile/",
              score: wantsProfile ? 218 : 204
            })
          );
        }

        return results;
      };

      const buildStaticPageResults = (data, parsed) => {
        if (!data || !Array.isArray(data.staticPages) || !parsed.normalized) {
          return [];
        }

        return data.staticPages
          .map((entry) => {
            const exactTitle = parsed.normalized === normalizeSearchText(entry.title);
            const exactAlias = entry.aliases.some((alias) => alias === parsed.normalized);
            const aliasHit = entry.aliases.some((alias) => matchesAlias(parsed.normalized, parsed.tokens, alias));
            const textHit = entry.searchText.includes(parsed.normalized);
            const tokenMatches = countTokenMatches(parsed.tokens, entry.tokenSet);

            if (!(exactTitle || exactAlias || aliasHit || textHit || tokenMatches > 0)) {
              return null;
            }

            let score = 0;
            if (exactTitle) score += 216;
            else if (exactAlias) score += 212;
            else if (aliasHit) score += 178;
            else if (textHit) score += 144;
            else score += 112;

            score += Math.min(tokenMatches, 6) * 8;

            if (parsed.isPastPaperIntent && entry.id !== "page:past-papers") {
              score -= 52;
            }
            if (parsed.subjectCode || parsed.subjectSlugs.size) {
              score -= 28;
            }

            return createSitePageResult(entry, score);
          })
          .filter(Boolean);
      };

      const buildSubjectResults = (data, parsed, boosts) => {
        const results = [];

        data.subjects.forEach((subject) => {
          const exactCode = parsed.subjectCode === subject.code;
          const exactName = parsed.normalized === subject.normalizedName;
          const aliasHit = subject.aliases.some((alias) => matchesAlias(parsed.normalized, parsed.tokens, alias));
          const textHit = subject.searchText.includes(parsed.normalized);
          const partialTokenHit = parsed.tokens.some(
            (token) => token.length > 1 && (subject.code.includes(token) || subject.normalizedName.includes(token))
          );

          if (!(exactCode || exactName || aliasHit || textHit || partialTokenHit)) {
            return;
          }

          let baseScore = 0;
          if (exactCode) baseScore = 170;
          else if (exactName) baseScore = 166;
          else if (aliasHit) baseScore = 154;
          else if (textHit) baseScore = 132;
          else if (partialTokenHit) baseScore = 104;

          if (parsed.hasPaperFilters || parsed.fileIntent) {
            baseScore -= 26;
          }
          if (parsed.isPastPaperIntent) {
            baseScore -= parsed.hasSpecificPastPaperTarget ? 92 : 38;
          }
          if (parsed.contentTokens.length) {
            baseScore -= 14;
          }
          baseScore += boosts.subjectBoosts.get(subject.slug) || 0;

          results.push(createSubjectResult(subject, baseScore + 14));
          results.push(
            createSyllabusResult(
              subject,
              baseScore + (parsed.intents.has("syllabus") ? 26 : 6)
            )
          );

          if (subject.hasPastPapers) {
            results.push(
              createPastPaperHubResult(
                subject,
                baseScore + (parsed.intents.has("past-papers") || parsed.hasPaperFilters ? 30 : 8)
              )
            );
          }
        });

        return results;
      };

      const buildSyllabusTopicResults = (data, parsed, boosts) => {
        if (!parsed.normalized || parsed.hasPaperFilters || parsed.intents.has("past-papers") || parsed.fileIntent) {
          return [];
        }

        if (!parsed.contentTokens.length) {
          return [];
        }

        const resultsBySignature = data.syllabusEntries
          .map((entry) => {
            if (parsed.subjectCode && entry.subjectCode !== parsed.subjectCode) {
              return null;
            }
            if (parsed.subjectSlugs.size && !parsed.subjectSlugs.has(entry.subjectSlug)) {
              return null;
            }

            const contentTokenCount = parsed.contentTokens.length;
            const tokenMatches = countTokenMatches(parsed.contentTokens, entry.tokenSet);
            const topicMatches = countTokenMatches(parsed.contentTokens, entry.topicTokenSet);
            const sectionMatches = countTokenMatches(parsed.contentTokens, entry.sectionTokenSet);
            const topicExactMatch = !!parsed.contentQuery && entry.topicSearchText === parsed.contentQuery;
            const sectionExactMatch = !!parsed.contentQuery && entry.sectionSearchText === parsed.contentQuery;
            const topicPhraseMatch = !!parsed.contentQuery && entry.topicSearchText.includes(parsed.contentQuery);
            const sectionPhraseMatch = !!parsed.contentQuery && entry.sectionSearchText.includes(parsed.contentQuery);
            const fullQueryMatch = entry.searchText.includes(parsed.normalized);
            const coverage = contentTokenCount ? tokenMatches / contentTokenCount : 0;

            if (
              !topicExactMatch &&
              !sectionExactMatch &&
              !topicPhraseMatch &&
              !sectionPhraseMatch &&
              !fullQueryMatch &&
              tokenMatches === 0
            ) {
              return null;
            }
            if (
              !parsed.subjectSlugs.size &&
              !parsed.subjectCode &&
              tokenMatches < 1 &&
              !topicPhraseMatch &&
              !sectionPhraseMatch &&
              !topicExactMatch &&
              !sectionExactMatch
            ) {
              return null;
            }
            if (!parsed.subjectSlugs.size && !parsed.subjectCode && contentTokenCount > 1 && coverage < 0.5) {
              return null;
            }

            let score = 0;

            if (entry.kind === "topic") {
              if (topicExactMatch) score += 232;
              else if (topicPhraseMatch) score += 196;
              else if (sectionExactMatch) score += 108;
              else if (sectionPhraseMatch) score += 82;
            } else if (sectionExactMatch) {
              score += 214;
            } else if (sectionPhraseMatch) {
              score += 178;
            } else if (fullQueryMatch) {
              score += 164;
            }

            score += tokenMatches * 28;
            score += topicMatches * 20;
            score += sectionMatches * 14;

            if (coverage === 1 && contentTokenCount) {
              score += 42;
            }
            if (parsed.intents.has("syllabus")) {
              score += 28;
            }
            if (parsed.subjectCode === entry.subjectCode) {
              score += 40;
            }
            if (parsed.subjectSlugs.has(entry.subjectSlug)) {
              score += 34;
            }
            if (entry.kind === "topic") {
              score += 10;
            }

            score += boosts.subjectBoosts.get(entry.subjectSlug) || 0;
            score += boosts.topicBoosts.get(entry.topicKey || "") || 0;

            if (score <= 0) {
              return null;
            }

            return createSyllabusTopicResult(entry, score);
          })
          .filter(Boolean)
          .reduce((map, result) => {
            const signature = [
              result.type,
              result.subjectSlug,
              String(result.title || "").toLowerCase(),
              String(result.subtitle || "").replace(/\b(Core|Extended)\b/gi, "").toLowerCase()
            ].join("::");
            const existing = map.get(signature);
            if (!existing || result.score > existing.score) {
              map.set(signature, result);
            }
            return map;
          }, new Map());

        return Array.from(resultsBySignature.values());
      };

      const buildPastPaperResults = (data, parsed, boosts) => {
        if (
          !parsed.normalized ||
          (!parsed.isPastPaperIntent &&
            !parsed.intents.has("past-papers") &&
            !parsed.fileIntent &&
            !parsed.subjectCode &&
            !parsed.subjectSlugs.size)
        ) {
          return [];
        }

        return (data.paperSearchIndex || data.paperEntries)
          .map((entry) => {
            const subjectCodeMatch = parsed.subjectCode === entry.subjectCode;
            const subjectSlugMatch = parsed.subjectSlugs.has(entry.subjectSlug);

            if (parsed.subjectCode && entry.subjectCode !== parsed.subjectCode) {
              return null;
            }
            if (parsed.subjectSlugs.size && !parsed.subjectSlugs.has(entry.subjectSlug)) {
              return null;
            }
            if (parsed.year && entry.year !== parsed.year) {
              return null;
            }
            if (parsed.session && entry.session !== parsed.session) {
              return null;
            }
            if (parsed.paper && entry.paperNumber !== parsed.paper) {
              return null;
            }
            if (parsed.variant && !matchesVariantQuery(parsed.variant, entry.variantNumber || entry.variant)) {
              return null;
            }
            if (parsed.fileIntent === "qp" && !(entry.qpUrl || entry.qpHref)) {
              return null;
            }
            if (parsed.fileIntent === "ms" && !(entry.msUrl || entry.msHref)) {
              return null;
            }

            const tokenMatches = countTokenMatches(parsed.tokens, entry.tokenSet || buildTokenSet(entry.searchText));
            const fullQueryMatch = entry.searchText.includes(parsed.normalized);
            const paperPhraseMatch = parsed.paper ? entry.searchText.includes(`paper ${parsed.paper}`) : false;
            const variantPhraseMatch = parsed.variant ? entry.searchText.includes(`variant ${parsed.variant}`) : false;
            let score = 0;

            if (subjectCodeMatch) score += 240;
            if (subjectSlugMatch) score += 188;
            if (parsed.year) score += 82;
            if (parsed.session) score += 72;
            if (parsed.paper) score += 104;
            if (parsed.variant) score += 128;
            if (parsed.fileIntent) score += 62;
            if (parsed.hasPaperFilters) score += 54;
            if (parsed.isPastPaperIntent) score += 48;
            if (parsed.hasSpecificPastPaperTarget) score += 64;
            if (parsed.intents.has("past-papers")) score += 24;
            if (fullQueryMatch) score += 36;
            if (paperPhraseMatch) score += 18;
            if (variantPhraseMatch) score += 20;
            score += Math.min(tokenMatches, 8) * 7;
            if (parsed.year && parsed.paper && (subjectCodeMatch || subjectSlugMatch)) {
              score += 132;
            }
            if (parsed.session && parsed.paper) {
              score += 52;
            }
            if (parsed.variant && (subjectCodeMatch || subjectSlugMatch)) {
              score += 104;
            }
            if (parsed.fileIntent && parsed.paper) {
              score += 56;
            }
            if (parsed.fileIntent === "qp" && (entry.qpUrl || entry.qpHref)) {
              score += 10;
            }
            if (parsed.fileIntent === "ms" && (entry.msUrl || entry.msHref)) {
              score += 10;
            }
            if (
              !parsed.isPastPaperIntent &&
              !parsed.intents.has("past-papers") &&
              !parsed.fileIntent &&
              (parsed.subjectCode || parsed.subjectSlugs.size)
            ) {
              score -= 60;
            }

            score += boosts.trackBoosts.get(entry.trackKey) || 0;

            if (score <= 0) {
              return null;
            }

            return createPastPaperResult(entry, score, {
              fileIntent: parsed.fileIntent
            });
          })
          .filter(Boolean)
          .sort((left, right) => {
            if (right.score !== left.score) return right.score - left.score;
            const rightEntry = data.paperByTrackKey.get(right.trackKey);
            const leftEntry = data.paperByTrackKey.get(left.trackKey);
            if (!leftEntry || !rightEntry) return 0;
            if (rightEntry.year !== leftEntry.year) return rightEntry.year - leftEntry.year;
            if (rightEntry.sessionRank !== leftEntry.sessionRank) {
              return rightEntry.sessionRank - leftEntry.sessionRank;
            }
            if (leftEntry.paperNumber !== rightEntry.paperNumber) {
              return leftEntry.paperNumber - rightEntry.paperNumber;
            }
            return Number(leftEntry.variant) - Number(rightEntry.variant);
          });
      };

      const buildPaperFileResults = (data, parsed) => {
        if (
          !data ||
          !Array.isArray(data.fileEntries) ||
          !parsed.normalized ||
          (!parsed.isPastPaperIntent &&
            !parsed.intents.has("past-papers") &&
            !parsed.fileIntent &&
            !parsed.subjectCode &&
            !parsed.subjectSlugs.size)
        ) {
          return [];
        }

        return data.fileEntries
          .map((entry) => {
            const subjectCodeMatch = parsed.subjectCode === entry.subjectCode;
            const subjectSlugMatch = parsed.subjectSlugs.has(entry.subjectSlug);

            if (parsed.subjectCode && entry.subjectCode !== parsed.subjectCode) {
              return null;
            }
            if (parsed.subjectSlugs.size && !parsed.subjectSlugs.has(entry.subjectSlug)) {
              return null;
            }
            if (parsed.year && entry.year !== parsed.year) {
              return null;
            }
            if (parsed.session && entry.session !== parsed.session) {
              return null;
            }
            if (parsed.paper && entry.paperNumber && entry.paperNumber !== parsed.paper) {
              return null;
            }
            if (parsed.variant && entry.variantNumber && !matchesVariantQuery(parsed.variant, entry.variantNumber)) {
              return null;
            }
            if (parsed.fileIntent && entry.kind !== parsed.fileIntent) {
              return null;
            }

            const tokenMatches = countTokenMatches(parsed.tokens, entry.tokenSet);
            const fullQueryMatch = entry.searchText.includes(parsed.normalized);
            const exactFileMatch = normalizeSearchText(entry.fileName) === parsed.normalized;
            let score = 0;

            if (subjectCodeMatch) score += 216;
            if (subjectSlugMatch) score += 176;
            if (parsed.year) score += 78;
            if (parsed.session) score += 64;
            if (parsed.paper && entry.paperNumber) score += 96;
            if (parsed.variant && entry.variantNumber) score += 112;
            if (parsed.fileIntent && parsed.fileIntent === entry.kind) score += 124;
            if (parsed.isPastPaperIntent) score += 34;
            if (exactFileMatch) score += 142;
            else if (fullQueryMatch) score += 54;
            score += Math.min(tokenMatches, 8) * 10;

            if (!parsed.fileIntent && !parsed.year && !parsed.paper && !parsed.variant && tokenMatches < 2 && !fullQueryMatch) {
              return null;
            }

            if (score <= 0) {
              return null;
            }

            return createPaperFileResult(entry, score);
          })
          .filter(Boolean);
      };

      const dedupeResults = (results) => {
        const seen = new Set();
        return results.filter((result) => {
          if (!result || seen.has(result.id)) return false;
          seen.add(result.id);
          return true;
        });
      };

      const buildContinueWhereLeftOff = (data) => {
        if (!data || !isSignedIn()) return [];

        const results = [];
        const recentSelection = readRecentSelections().find((item) => item.type && item.type !== "query");

        if (recentSelection) {
          if (recentSelection.topicKey && data.syllabusByTopicKey.has(recentSelection.topicKey)) {
            results.push(
              createSyllabusTopicResult(
                data.syllabusByTopicKey.get(recentSelection.topicKey),
                999,
                "Continue where you left off"
              )
            );
          } else if (recentSelection.trackKey && data.paperByTrackKey.has(recentSelection.trackKey)) {
            results.push(
              createPastPaperResult(
                data.paperByTrackKey.get(recentSelection.trackKey),
                999,
                { subtitle: "Continue where you left off" }
              )
            );
          } else if (recentSelection.subjectSlug && data.subjectBySlug.has(recentSelection.subjectSlug)) {
            const subject = data.subjectBySlug.get(recentSelection.subjectSlug);
            results.push(
              createNavigateResult({
                id: `continue:${recentSelection.id}`,
                type: recentSelection.type || "subject",
                icon: /^syllabus/.test(recentSelection.type || "") ? "book-open" : "file-text",
                title: recentSelection.title || `${subject.name} (${subject.code})`,
                subtitle: "Continue where you left off",
                href: recentSelection.href || subject.subjectHref,
                subjectSlug: subject.slug,
                score: 999
              })
            );
          }
        }

        if (results.length) {
          return dedupeResults(results).slice(0, 2);
        }

        const snapshot = readProgressSnapshot();
        const paperCandidates = Object.keys(snapshot.pastPaperStatuses || {})
          .map((trackKey) => {
            const entry = data.paperByTrackKey.get(trackKey);
            if (!entry) return null;
            const status = snapshot.pastPaperStatuses[trackKey];
            const statusRank = status === "in_progress" ? 3 : status === "done" ? 2 : 1;
            return { entry, status, statusRank };
          })
          .filter(Boolean)
          .sort((left, right) => {
            if (right.statusRank !== left.statusRank) return right.statusRank - left.statusRank;
            if (right.entry.year !== left.entry.year) return right.entry.year - left.entry.year;
            return right.entry.sessionRank - left.entry.sessionRank;
          });

        if (paperCandidates[0]) {
          results.push(
            createPastPaperResult(
              paperCandidates[0].entry,
              998,
              {
                subtitle:
                  paperCandidates[0].status === "in_progress"
                    ? "Continue tracked past paper"
                    : "Resume tracked past paper"
              }
            )
          );
        }

        const syllabusCandidates = Object.keys(snapshot.syllabusTopicStates || {})
          .map((topicKey) => {
            const entry = data.syllabusByTopicKey.get(topicKey);
            if (!entry) return null;
            const status = snapshot.syllabusTopicStates[topicKey];
            const statusRank = status === "in_progress" ? 3 : status === "completed" ? 2 : 1;
            return { entry, status, statusRank };
          })
          .filter(Boolean)
          .sort((left, right) => {
            if (right.statusRank !== left.statusRank) return right.statusRank - left.statusRank;
            if ((right.entry.sectionIndex || 0) !== (left.entry.sectionIndex || 0)) {
              return (right.entry.sectionIndex || 0) - (left.entry.sectionIndex || 0);
            }
            return (right.entry.topicIndex || 0) - (left.entry.topicIndex || 0);
          });

        if (syllabusCandidates[0]) {
          results.push(
            createSyllabusTopicResult(
              syllabusCandidates[0].entry,
              997,
              syllabusCandidates[0].status === "in_progress" ? "Continue syllabus topic" : "Resume syllabus topic"
            )
          );
        }

        const syllabusBySubject = new Map();
        Object.keys(snapshot.syllabusTopicStates || {}).forEach((topicKey) => {
          const state = snapshot.syllabusTopicStates[topicKey];
          if (state !== "in_progress" && state !== "completed") return;
          const subjectSlug = String(topicKey).split("::")[0];
          const bucket = syllabusBySubject.get(subjectSlug) || { in_progress: 0, completed: 0 };
          bucket[state] += 1;
          syllabusBySubject.set(subjectSlug, bucket);
        });

        const bestSyllabus = Array.from(syllabusBySubject.entries())
          .map(([subjectSlug, counts]) => ({ subjectSlug, counts }))
          .filter((item) => data.subjectBySlug.has(item.subjectSlug))
          .sort((left, right) => {
            if (right.counts.in_progress !== left.counts.in_progress) {
              return right.counts.in_progress - left.counts.in_progress;
            }
            return right.counts.completed - left.counts.completed;
          })[0];

        if (bestSyllabus) {
          const subject = data.subjectBySlug.get(bestSyllabus.subjectSlug);
          results.push(
            createSyllabusResult(
              subject,
              997,
              `${bestSyllabus.counts.in_progress} in progress • ${bestSyllabus.counts.completed} completed`
            )
          );
        }

        return dedupeResults(results).slice(0, 2);
      };

      const buildSuggestedSubjectResults = (data) => {
        if (!data) return [];

        const snapshot = readProgressSnapshot();
        const trackedSubjects = Array.isArray(snapshot.trackedSubjects) ? snapshot.trackedSubjects : [];
        const ordered = [];
        const seen = new Set();

        trackedSubjects.forEach((subject) => {
          const slug = String(subject && (subject.slug || subject.subjectSlug) ? subject.slug || subject.subjectSlug : "").trim();
          const resolved = data.subjectBySlug.get(slug) || data.subjectByCode.get(String(subject && subject.code ? subject.code : "").trim());
          if (!resolved || seen.has(resolved.slug)) return;
          seen.add(resolved.slug);
          ordered.push(resolved);
        });

        FEATURED_SUBJECT_CODES.forEach((code) => {
          const subject = data.subjectByCode.get(code);
          if (!subject || seen.has(subject.slug)) return;
          seen.add(subject.slug);
          ordered.push(subject);
        });

        return ordered.slice(0, 4).map((subject) =>
          createNavigateResult({
            id: `suggested:${subject.slug}`,
            type: "subject",
            icon: "book-open",
            title: subject.name,
            subtitle: subject.code,
            href: subject.subjectHref,
            subjectSlug: subject.slug
          })
        );
      };

      const buildFocusCollections = (data) => {
        const collections = [];
        const continueResults = buildContinueWhereLeftOff(data);
        const recentSearches = readRecentSearches().map((item) =>
          createQueryResult(item.query, "Run search again", "history", `recent:${item.normalized}`)
        );

        if (continueResults.length) {
          collections.push({
            title: "Continue where you left off",
            layout: "list",
            items: continueResults
          });
        }

        if (recentSearches.length) {
          collections.push({
            title: "Recent searches",
            layout: "list",
            items: recentSearches
          });
        }

        if (data) {
          const suggested = buildSuggestedSubjectResults(data);
          if (suggested.length) {
            collections.push({
              title: "Suggested subjects",
              layout: "grid",
              items: suggested
            });
          }
        }

        collections.push({
          title: "Popular searches",
          layout: "grid",
          items: POPULAR_SEARCHES.map((item) =>
            createQueryResult(item.query, item.description, item.icon, `popular:${normalizeSearchText(item.query)}`)
          )
        });

        return collections;
      };

      const buildSearchCollections = (data, query) => {
        const parsed = parseSearchQuery(query, data);
        const boosts = buildRecentBoostMaps();
        const results = dedupeResults(
          [
            ...buildProfileRouteResults(parsed),
            ...buildStaticPageResults(data, parsed),
            ...buildSubjectResults(data, parsed, boosts),
            ...buildSyllabusTopicResults(data, parsed, boosts),
            ...buildPastPaperResults(data, parsed, boosts),
            ...buildPaperFileResults(data, parsed)
          ].sort((left, right) => {
            if (right.score !== left.score) return right.score - left.score;
            if ((right.sortYear || 0) !== (left.sortYear || 0)) {
              return (right.sortYear || 0) - (left.sortYear || 0);
            }
            if ((right.sortSessionRank || 0) !== (left.sortSessionRank || 0)) {
              return (right.sortSessionRank || 0) - (left.sortSessionRank || 0);
            }
            if ((left.sortPaperNumber || 0) !== (right.sortPaperNumber || 0)) {
              return (left.sortPaperNumber || 0) - (right.sortPaperNumber || 0);
            }
            if ((left.sortVariant || 0) !== (right.sortVariant || 0)) {
              return (left.sortVariant || 0) - (right.sortVariant || 0);
            }
            if ((left.sortSectionIndex || 0) !== (right.sortSectionIndex || 0)) {
              return (left.sortSectionIndex || 0) - (right.sortSectionIndex || 0);
            }
            if ((left.sortTopicIndex || 0) !== (right.sortTopicIndex || 0)) {
              return (left.sortTopicIndex || 0) - (right.sortTopicIndex || 0);
            }
            return String(left.title || "").localeCompare(String(right.title || ""));
          })
        ).slice(0, HOME_SEARCH_LIMITS.results);

        if (!results.length) {
          return [
            {
              title: "No matches",
              layout: "list",
              empty: "No matches found. Try a subject code, year, session, paper number, or topic."
            },
            {
              title: "Popular searches",
              layout: "grid",
              items: POPULAR_SEARCHES.map((item) =>
                createQueryResult(item.query, item.description, item.icon, `popular:${normalizeSearchText(item.query)}`)
              )
            }
          ];
        }

        return [
          {
            title: "Best matches",
            layout: "list",
            items: results
          }
        ];
      };

      const getSingleResolvedSubject = (data, parsed) => {
        if (!data || !parsed) return null;
        if (parsed.subjectCode && data.subjectByCode.has(parsed.subjectCode)) {
          return data.subjectByCode.get(parsed.subjectCode);
        }
        if (parsed.subjectSlugs && parsed.subjectSlugs.size === 1) {
          return data.subjectBySlug.get(Array.from(parsed.subjectSlugs)[0]) || null;
        }
        return null;
      };

      const resolveExactFileNavigationTarget = (data, parsed) => {
        if (!data || !parsed || !parsed.exactFileName) {
          return null;
        }

        const exactTarget = data.exactFileTargetByName instanceof Map
          ? data.exactFileTargetByName.get(String(parsed.exactFileName).toLowerCase())
          : null;

        if (!exactTarget) {
          return null;
        }

        if (exactTarget.type === "paper-file") {
          return createPaperFileResult(exactTarget.entry, 999);
        }

        if (exactTarget.type === "track-file") {
          return createPastPaperResult(exactTarget.entry, 999, {
            fileIntent: exactTarget.fileIntent
          });
        }

        return null;
      };

      const resolveBroadSubjectNavigationTarget = (data, parsed) => {
        const subject = getSingleResolvedSubject(data, parsed);
        if (!subject) return null;

        if (parsed.intents.has("past-papers") && !parsed.hasSpecificPastPaperTarget && !parsed.fileIntent) {
          return subject.hasPastPapers ? createPastPaperHubResult(subject, 999) : null;
        }

        if (parsed.intents.has("syllabus") && !parsed.contentTokens.length) {
          return createSyllabusResult(subject, 999);
        }

        if (!parsed.intents.size && !parsed.contentTokens.length && !parsed.hasPaperFilters && !parsed.fileIntent) {
          return createSubjectResult(subject, 999);
        }

        return null;
      };

      const resolveExactStaticNavigationTarget = (data, parsed) => {
        if (!data || !Array.isArray(data.staticPages) || !parsed || !parsed.normalized) {
          return null;
        }

        const directMatches = data.staticPages
          .map((entry) => {
            const normalizedTitle = normalizeSearchText(entry.title);
            const exactTitle = parsed.normalized === normalizedTitle;
            const exactAlias = entry.aliases.some((alias) => alias === parsed.normalized);

            if (!(exactTitle || exactAlias)) {
              return null;
            }

            let score = 0;
            if (exactTitle) score += 220;
            if (exactAlias) score += 216;

            return createSitePageResult(entry, score);
          })
          .filter(Boolean)
          .sort((left, right) => right.score - left.score);

        return directMatches[0] || null;
      };

      const resolveHomeSearchNavigationTarget = (data, query) => {
        if (!data || !String(query || "").trim()) {
          return null;
        }

        const parsed = parseSearchQuery(query, data);
        const boosts = buildRecentBoostMaps();
        const exactStaticTarget = resolveExactStaticNavigationTarget(data, parsed);
        if (exactStaticTarget) {
          return exactStaticTarget;
        }
        const exactFileTarget = resolveExactFileNavigationTarget(data, parsed);
        if (parsed.exactFileName) {
          return exactFileTarget;
        }

        const broadSubjectTarget = resolveBroadSubjectNavigationTarget(data, parsed);
        if (broadSubjectTarget) {
          return broadSubjectTarget;
        }

        const wantsDirectFile =
          !!parsed.fileIntent ||
          /\.pdf\b/i.test(String(query || "")) ||
          /\b(download|open file|pdf)\b/.test(parsed.normalized);

        if (parsed.hasPaperFilters || parsed.isPastPaperIntent) {
          if (!wantsDirectFile) {
            const paperResults = buildPastPaperResults(data, parsed, boosts);
            if (paperResults.length) {
              const distinctVariants = new Set(
                paperResults
                  .map((result) => data.paperByTrackKey.get(result.trackKey))
                  .filter(Boolean)
                  .map((entry) => String(entry.variantNumber || entry.variant || ""))
              );
              const shouldOpenHub =
                !!getSingleResolvedSubject(data, parsed) &&
                !parsed.variant &&
                !parsed.fileIntent &&
                (
                  (!parsed.paper && !parsed.session && !parsed.year) ||
                  (parsed.paper && distinctVariants.size > 1)
                );

              if (shouldOpenHub) {
                const subject = getSingleResolvedSubject(data, parsed);
                return subject && subject.hasPastPapers
                  ? createPastPaperHubResult(subject, 999)
                  : paperResults[0];
              }

              if (parsed.hasSpecificPastPaperTarget) {
                const preferredAction =
                  (paperResults[0].actions || []).find((action) => action.label === "QP" && action.href) ||
                  (paperResults[0].actions || []).find((action) => action.label === "MS" && action.href);
                if (preferredAction && preferredAction.href) {
                  return Object.assign({}, paperResults[0], {
                    href: preferredAction.href,
                    badge: preferredAction.label,
                    subtitle:
                      preferredAction.label === "MS"
                        ? "Open the matching mark scheme"
                        : "Open the matching question paper"
                  });
                }
              }
              return paperResults[0];
            }
          }

          const fileResults = buildPaperFileResults(data, parsed);
          if (fileResults.length) {
            return fileResults[0];
          }

          if (parsed.fileIntent && ["ci", "in", "gt", "er"].indexOf(parsed.fileIntent) !== -1) {
            return null;
          }
        }

        const collections = buildSearchCollections(data, query);
        const items = collections.flatMap((collection) => collection.items || []);

        const scoredItems = items
          .filter((item) => item && item.mode === "navigate" && item.href)
          .map((item) => {
            let score = Number(item.score || 0);

            if (parsed.hasPaperFilters || parsed.isPastPaperIntent) {
              if (item.type === "past-paper") {
                score += parsed.hasSpecificPastPaperTarget ? 180 : 92;
              } else if (item.type === "past-papers-hub") {
                score += parsed.hasSpecificPastPaperTarget ? 36 : 88;
              } else if (item.type === "paper-file") {
                score += wantsDirectFile ? 84 : -180;
              }
            }

            if (parsed.intents.has("syllabus")) {
              if (item.type === "syllabus" || item.type === "syllabus-topic" || item.type === "syllabus-section") {
                score += 90;
              } else if (item.type === "paper-file" || item.type === "past-paper") {
                score -= 70;
              }
            }

            if (parsed.intents.has("settings") && item.type === "site-page" && item.href === "/settings/") {
              score += 140;
            }

            if ((parsed.intents.has("profile") || parsed.intents.has("progress")) && (item.type === "profile" || item.type === "progress")) {
              score += 140;
            }

            return { item, score };
          })
          .sort((left, right) => right.score - left.score);

        return scoredItems[0]?.item || null;
      };

      const mountHomeSearchBar = (host) => {

        const search = shadowRoot.querySelector(".ig-search");
        const input = shadowRoot.querySelector(".ig-input");

        const submit = shadowRoot.querySelector(".ig-submit");
        const placeholderPrompts = [
          "Search for a subject",
          "Search for a past paper",
          "Search for a topic",
          "Search for progress",
          "Search for settings"
        ];
        let placeholderIndex = 0;
        let placeholderInterval = null;
        let placeholderTimeout = null;

        const state = {
          data: null,
          loading: false,
          query: ""
        };

        const syncTheme = () => {

        };

        const syncFilledState = () => {
          search.classList.toggle("is-filled", Boolean(state.query.trim()));

        const rotatePlaceholder = () => {
          if (!placeholder || state.query.trim()) return;
          placeholder.classList.add("is-exiting");
          window.clearTimeout(placeholderTimeout);
          placeholderTimeout = window.setTimeout(() => {
            placeholderIndex = (placeholderIndex + 1) % placeholderPrompts.length;
            placeholder.textContent = placeholderPrompts[placeholderIndex];
            placeholder.classList.remove("is-exiting");
            placeholder.classList.add("is-entering");
            window.requestAnimationFrame(() => {

      const applyHomeHeroTheme = (heroSection) => {

          return;

        const heroContent = heroSection.querySelector(".relative.z-10");
        if (heroContent) {
          [heroContent.querySelector("h1"), ...heroContent.querySelectorAll("h1 span, p")].forEach(

        const rootShell = document.querySelector("#root > div");
