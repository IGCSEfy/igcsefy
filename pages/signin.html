<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="/favicon.svg?v=20260411a" type="image/svg+xml">
  <link rel="icon" href="/favicon-32x32.png?v=20260411a" sizes="32x32" type="image/png">
  <link rel="icon" href="/favicon-16x16.png?v=20260411a" sizes="16x16" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=20260411a" sizes="180x180">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | IGCSEfy</title>
  <meta name="description" content="Sign in to IGCSEfy with Google">
  <script>
    (function () {
      try {
        var raw = localStorage.getItem('igcsefy-settings');
        var theme = 'dark';
        if (raw) {
          var parsed = JSON.parse(raw);
          var preference = parsed && parsed.appearance ? parsed.appearance.theme : '';
          if (preference === 'light' || preference === 'dark') {
            theme = preference;
          } else if (preference === 'system' && window.matchMedia && !window.matchMedia('(prefers-color-scheme: dark)').matches) {
            theme = 'light';
          }
        }
        document.documentElement.classList.add(theme);
      } catch (error) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <style>
    :root { color-scheme: dark; }
    html.light { color-scheme: light; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }
    html.light, html.light body {
      background: #F1EFE7;
      color: #000000;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .signin-card {
      width: min(420px, 100%);
      border: 1px solid #1b1b1b;
      background: #0f0f0f;
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
    }
    html.light .signin-card {
      border-color: #E9E3D8;
      background: #FFFFFF;
      box-shadow: 0 18px 40px rgba(0,0,0,.08);
    }
    .spinner {
      width: 28px;
      height: 28px;
      margin: 0 auto 18px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.14);
      border-top-color: rgba(236,234,221,.95);
      animation: spin .8s linear infinite;
    }
    html.light .spinner {
      border-color: rgba(233,227,216,.9);
      border-top-color: #000000;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 22px;
      color: #eceadd;
    }
    html.light h1 { color: #000000; }
    p {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: #8b8b8b;
    }
    html.light p { color: #666666; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script defer src="/assets/analytics.js?v=20260410o"></script>
</head>
<body>
  <div class="signin-card">
    <div class="spinner" aria-hidden="true"></div>
    <h1>Connecting your IGCSEfy profile</h1>
    <p id="signin-status">Preparing Google sign in...</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/assets/supabase-progress.js?v=20260410m"></script>
</body>
</html>
