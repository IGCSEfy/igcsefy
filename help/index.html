<script>
  (function(){
    try{
      var raw = localStorage.getItem("igcsefy-settings");
      var preference = "";
      if(raw){
        var parsed = JSON.parse(raw);
        preference = parsed && parsed.appearance ? parsed.appearance.theme : "";
      }
      var resolved = preference === "system" || !preference
        ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        : preference;
      var root = document.documentElement;
      root.classList.remove("light", "dark");
      root.classList.add(resolved === "dark" ? "dark" : "light");
      root.dataset.theme = resolved;
      root.dataset.themePreference = preference || "system";
    } catch (error) {}
  })();
</script>

<meta charset="utf-8"/>

<style>
    /* Help wrapper only. No new colors, no accents. */
    html.light{color-scheme:light}
    html.light body,
    html.light .help-wrap{background:#F1EFE7}
    html.light .help-iframe{background:#FFFFFF}
    .help-wrap{min-height:100vh; display:flex; flex-direction:column}
    .help-iframe{width:100%; border:0; display:block; height:calc(100vh - var(--nav-h, 72px))}

</div>
<nav class="links">
<a aria-current="page" class="link" href="/">Home</a>

<a class="link" href="/help">AI</a>

</nav>
</div>
</header>
<iframe class="help-iframe" src="/help-center" title="IGCSEfy Help Center"></iframe>
</div>
<script>
    (function(){
      function setNavH(){
        var header = document.querySelector('header');
        if(!header) return;
        var h = Math.ceil(header.getBoundingClientRect().height || 0);
        document.documentElement.style.setProperty('--nav-h', (h||72) + 'px');
      }

      // Ensure the correct nav item is highlighted for this page.
      function setActiveNav(){
        var links = document.querySelectorAll('nav.links a.link');
        if(!links || !links.length) return;
        links.forEach(function(a){ a.removeAttribute('aria-current'); });
        // Match /help and /help/ safely.
        var helpLink = document.querySelector('nav.links a.link[href="/help"], nav.links a.link[href="/help/"]');
        if(helpLink) helpLink.setAttribute('aria-current','page');
      }
      window.addEventListener('load', setNavH);
      window.addEventListener('resize', setNavH);
      setNavH();

      // Run after layout and also after the deferred app.js, just in case.
      window.addEventListener('load', setActiveNav);
      setActiveNav();
    })();
  </script>
<script defer="" src="/assets/app.js"></script>
<script defer="" src="/assets/nav.js?v=20260409m"></script>
</body>
