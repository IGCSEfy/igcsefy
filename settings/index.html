<!DOCTYPE html>
<html lang="en">
<head>
<script>
  (function(){
    try{
      var raw = localStorage.getItem('igcsefy-settings');
      var preference = '';
      if(raw){
        var parsed = JSON.parse(raw);
        preference = parsed && parsed.appearance ? parsed.appearance.theme : '';
      }
      var resolved = preference === 'system'
        ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : (preference === 'light' || preference === 'dark' ? preference : 'dark');
      var root = document.documentElement;
      root.classList.remove('light', 'dark');
      root.classList.add(resolved === 'dark' ? 'dark' : 'light');
      root.dataset.theme = resolved;
      root.dataset.themePreference = preference === 'system' ? 'system' : resolved;
    } catch (error) {}
  })();
</script>

<script>
(() => {
  const SECTION_LABELS = {
    appearance: 'Appearance',
    account: 'Account',
    'study-preferences': 'Study Preferences',
    'paper-targets': 'Paper Targets',
    'data-privacy': 'Data & Privacy',
    help: 'Help'
  };

  function normalizeRequestedSection(value) {
    const normalized = String(value || '').trim().toLowerCase();
    return {
      appearance: 'appearance',
      account: 'account',
      'study-preferences': 'study-preferences',
      'study preferences': 'study-preferences',
      'paper-targets': 'paper-targets',
      'paper targets': 'paper-targets',
      'data-privacy': 'data-privacy',
      'data privacy': 'data-privacy',
      help: 'help'
    }[normalized] || '';
  }

  function getRequestedSectionFromLocation() {
    try {
      const url = new URL(window.location.href);
      return normalizeRequestedSection(url.searchParams.get('section') || String(url.hash || '').replace(/^#/, ''));
    } catch (error) {
      return '';
    }
  }

  function getRequestedSectionTarget(sectionId) {
    if (sectionId === 'paper-targets') {
      return document.querySelector('#paper-targets[data-igcsefy-custom-section="paper-targets"]') || document.getElementById('paper-targets');
    }
    return document.getElementById(sectionId);
  }

  function isVisibleTarget(node) {
    if (!node || node.hidden) return false;
    if (node.getAttribute && node.getAttribute('aria-hidden') === 'true') return false;
    const style = window.getComputedStyle(node);
    return style.display !== 'none' && style.visibility !== 'hidden';
  }

  function clearRequestedSectionFromLocation() {
    try {
      const url = new URL(window.location.href);
      if (url.searchParams.has('section')) url.searchParams.delete('section');
      if (url.searchParams.has('search-nav')) url.searchParams.delete('search-nav');
      url.hash = '';
      window.history.replaceState({}, document.title, url.pathname + url.search);
    } catch (error) {}
  }

  function activateRequestedSection() {
    const requestedSectionId = getRequestedSectionFromLocation();
    let attempts = 0;

    if (!requestedSectionId) return;

    function run() {
      const target = getRequestedSectionTarget(requestedSectionId);
      if (isVisibleTarget(target)) {
        target.scrollIntoView({ block: 'start', behavior: 'auto' });
        clearRequestedSectionFromLocation();
        return;
      }

      const label = SECTION_LABELS[requestedSectionId];
      const button = Array.from(document.querySelectorAll('#root nav button')).find((node) => {
        return String(node.textContent || '').trim() === label;
      });

      if (button) {
        button.click();
      }

      attempts += 1;
      if (attempts < 30) {
        window.setTimeout(run, 140);
      }
    }

    window.setTimeout(run, 420);
  }

  if (document.readyState === 'complete') {
    activateRequestedSection();
  } else {
    window.addEventListener('load', activateRequestedSection, { once: true });
  }
})();
</script>
