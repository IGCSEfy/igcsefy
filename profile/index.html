  <script>
   (function () {
    try {
      var raw = localStorage.getItem("igcsefy-settings");
      var preference = "";
      if (raw) {
        var parsed = JSON.parse(raw);
        preference = parsed && parsed.appearance ? parsed.appearance.theme : "";
      }
      var resolved = preference === "system"
        ? (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        : (preference === "light" || preference === "dark" ? preference : "dark");
      var root = document.documentElement;
      root.classList.remove("light", "dark");
      root.classList.add(resolved === "dark" ? "dark" : "light");
      root.dataset.theme = resolved;
      root.dataset.themePreference = preference === "system" ? "system" : resolved;
    } catch (error) {}
   })();
  </script>

  <script type="module">
   let lastPath = "";
function getPageNameFromPath(path) {
  const segments = path.split("/").filter(Boolean);
  return segments[0] || null;
}
function trackPageView() {
  const path = window.location.pathname;
  if (path === lastPath) return;
  lastPath = path;
  const pageName = getPageNameFromPath(path) || "home";
  const appId = "69a20677a7bf51ac20caffdc";
  const serverUrl = "https://igcsefy.com" || "";
  if (!appId) return;
  fetch(`${serverUrl}/app-logs/${appId}/log-user-in-app/${pageName}`, {
    method: "POST",
  }).catch(() => {});
}
const originalPushState = history.pushState.bind(history);
history.pushState = function (...args) {
  originalPushState(...args);
  trackPageView();
};
const originalReplaceState = history.replaceState.bind(history);
history.replaceState = function (...args) {
  originalReplaceState(...args);
  trackPageView();
};
window.addEventListener("popstate", trackPageView);
trackPageView();
  </script>
