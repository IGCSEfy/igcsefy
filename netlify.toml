# Chatbase Help Center proxy + local wrapper page
# /help is a local page (keeps IGCSEfy nav visible)
[[redirects]]
  from = "/help"
  to = "/help/index.html"
  status = 200

[[redirects]]
  from = "/help/*"
  to = "/help/index.html"
  status = 200

# Proxy Chatbase help center under /help-center
[[redirects]]
  from = "/help-center"
  to = "https://chatbase.co/ZKjOrUixUnYZUETT6w95H/help"
  status = 200

[[redirects]]
  from = "/help-center/*"
  to = "https://chatbase.co/ZKjOrUixUnYZUETT6w95H/help/:splat"
  status = 200
